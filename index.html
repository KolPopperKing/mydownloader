<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>מוריד סרטונים מקצועי</title>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md text-center">
        <h1 class="text-2xl font-bold mb-6 text-gray-800">מוריד סרטונים בקליק</h1>
        <input type="text" id="urlInput" placeholder="הדבק כאן לינק מיוטיוב..." 
               class="w-full p-3 border border-gray-300 rounded-lg mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500">
        <button onclick="getLink()" id="btn" 
                class="w-full bg-blue-600 text-white p-3 rounded-lg font-semibold hover:bg-blue-700 transition">
            הפק לינק להורדה
        </button>
        <div id="result" class="mt-6 text-gray-700"></div>
    </div>

    <script>
        async function getLink() {
            const url = document.getElementById('urlInput').value;
            const res = document.getElementById('result');
            const btn = document.getElementById('btn');
            
            if(!url) return alert("אנא הכנס לינק!");
            
            btn.disabled = true;
            btn.innerText = "מעבד...";
            res.innerHTML = "אנא המתן, השרת מתעורר...";

            try {
                const response = await fetch(`https://mydownloader-1.onrender.com/download?url=${encodeURIComponent(url)}`);
                const data = await response.json();
                
                if(data.download_url) {
                    res.innerHTML = `<a href="${data.download_url}" target="_blank" 
                                     class="block bg-green-600 text-white p-3 rounded-lg hover:bg-green-700">לחץ להורדה ישירה</a>`;
                }
            } catch (err) {
                res.innerHTML = `<p class="text-red-500">קרתה שגיאה. השרת כנראה ישן, נסה שוב בעוד 30 שניות.</p>`;
            } finally {
                btn.disabled = false;
                btn.innerText = "הפק לינק להורדה";
            }
        }
    </script>
</body>
</html>
