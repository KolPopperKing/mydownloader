<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>וריד סרטונים מהיר</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 50px; }
        input { padding: 10px; width: 300px; margin-bottom: 10px; }
        button { padding: 10px 20px; cursor: pointer; }
    </style>
</head>
<body>
    <h2>מוריד סרטונים מהיר</h2>
    <input type="text" id="urlInput" placeholder="הדבק לינק מיוטיוב כאן">
    <button onclick="downloadVideo()">קבל לינק להורדה</button>
    <p id="result"></p>

    <script>
        async function downloadVideo() {
            const url = document.getElementById('urlInput').value;
            const res = document.getElementById('result');
            res.innerText = "מעבד... (אם השרת ב-Render ישן, זה ייקח 30 שניות)";
            
            try {
                // כאן אנחנו פונים לשרת שלך ב-Render
                const response = await fetch(`https://mydownloader-1.onrender.com/download?url=${encodeURIComponent(url)}`);
                const data = await response.json();
                
                if(data.download_url) {
                    res.innerHTML = `<a href="${data.download_url}" target="_blank">לחץ כאן להורדת הקובץ</a>`;
                } else {
                    res.innerText = "שגיאה: לא נמצא לינק.";
                }
            } catch (err) {
                res.innerText = "שגיאה בחיבור לשרת, נסה שוב בעוד רגע.";
            }
        }
    </script>
</body>
</html>
