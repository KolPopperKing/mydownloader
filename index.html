<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>מוריד סרטונים מהיר</title>
</head>
<body>
    <h2>מוריד סרטונים מהאתר שלי</h2>
    <input type="text" id="urlInput" placeholder="הכנס לינק ליוטיוב כאן" style="width: 300px;">
    <button onclick="getDownloadLink()">קבל לינק להורדה</button>
    
    <div id="result" style="margin-top: 20px;"></div>

    <script>
        async function getDownloadLink() {
            const url = document.getElementById('urlInput').value;
            const resultDiv = document.getElementById('result');
            
            resultDiv.innerText = "מעבד...";

            try {
                // שימוש בכתובת החדשה שקיבלת מ-Render
                const response = await fetch(`https://mydownloader-1.onrender.com/download?url=${encodeURIComponent(url)}`);
                const data = await response.json();
                
                if(data.download_url) {
                    resultDiv.innerHTML = `<a href="${data.download_url}" target="_blank">לחץ כאן להורדת הקובץ</a>`;
                } else {
                    resultDiv.innerText = "משהו השתבש, נסה שוב.";
                }
            } catch (error) {
                resultDiv.innerText = "שגיאה בחיבור לשרת.";
            }
        }
    </script>
</body>
</html>
